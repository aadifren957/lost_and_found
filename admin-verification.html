<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honesty Verification Panel - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-input {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
        }

        .filter-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .verification-item {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #667eea;
            animation: slideIn 0.3s ease-out;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: #f9f9f9;
            border-bottom: 1px solid #eee;
        }

        .item-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
        }

        .item-status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .item-content {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 20px;
            padding: 20px;
        }

        .item-image {
            width: 150px;
            height: 150px;
            background: #eee;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-details {
            flex: 1;
        }

        .detail-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            margin-bottom: 12px;
            gap: 10px;
        }

        .detail-label {
            font-weight: 600;
            color: #666;
        }

        .detail-value {
            color: #333;
        }

        .reporter-info {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .reporter-info h4 {
            color: #667eea;
            margin-bottom: 8px;
        }

        .verification-form {
            background: #f5f9ff;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-approve {
            background: #28a745;
            color: white;
            flex: 1;
        }

        .btn-approve:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .btn-reject {
            background: #dc3545;
            color: white;
            flex: 1;
        }

        .btn-reject:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .btn-cancel {
            background: #6c757d;
            color: white;
        }

        .btn-cancel:hover {
            background: #5a6268;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .no-items {
            text-align: center;
            padding: 40px;
            color: #999;
            background: white;
            border-radius: 10px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            .item-content {
                grid-template-columns: 1fr;
            }

            .item-image {
                width: 100%;
                max-height: 300px;
            }

            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✓ Honesty Verification Panel</h1>
            <p>Review and verify found item reports to award honesty scores</p>
        </header>

        <div id="alertContainer"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Pending Verification</div>
                <div class="stat-value" id="pendingCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Verified Today</div>
                <div class="stat-value" id="verifiedToday">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Points Awarded</div>
                <div class="stat-value" id="totalPointsAwarded">0</div>
            </div>
        </div>

        <div class="filters">
            <input 
                type="text" 
                class="filter-input" 
                placeholder="Search by item title, user name, or location..."
                id="searchInput"
            >
            <select class="filter-input" id="sortBy">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
            </select>
            <button class="filter-btn" onclick="loadPendingVerifications()">Search</button>
        </div>

        <div id="verificationContainer"></div>
    </div>

    <!-- Modal for detailed verification -->
    <div id="verificationModal" style="display: none;">
        <div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999;"></div>
    </div>

    <script>
        const API_URL = "http://localhost:5000/api";
        let token = localStorage.getItem("token");
        let allPendingItems = [];

        // Check if user is logged in as admin
        function checkAdminAccess() {
            if (!token) {
                document.body.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;"><h2>Access Denied</h2><p>Admin authentication required</p></div>';
            }
        }

        checkAdminAccess();

        async function loadPendingVerifications() {
            const container = document.getElementById("verificationContainer");
            container.innerHTML = '<div class="loading">Loading pending verifications...</div>';

            try {
                const response = await fetch(`${API_URL}/honesty/admin/pending`, {
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error("Failed to load pending verifications");
                }

                const data = await response.json();
                allPendingItems = data.items || [];

                document.getElementById("pendingCount").textContent = data.count || 0;

                if (allPendingItems.length === 0) {
                    container.innerHTML = '<div class="no-items">🎉 No pending verifications! All reports have been reviewed.</div>';
                    return;
                }

                renderPendingItems(allPendingItems);

            } catch (error) {
                console.error("Error loading pending verifications:", error);
                container.innerHTML = `<div class="error">Error loading verifications. Please try again.</div>`;
            }
        }

        function renderPendingItems(items) {
            const container = document.getElementById("verificationContainer");
            let html = "";

            items.forEach(item => {
                const reportedBy = item.reportedByUserId || {};
                const matchedItem = item.matchedLostItem || {};
                const imageUrl = item.image ? `/uploads/${item.image}` : null;

                html += `
                    <div class="verification-item">
                        <div class="item-header">
                            <div>
                                <div class="item-title">${item.title || "Unknown Item"}</div>
                            </div>
                            <span class="item-status status-pending">Pending Review</span>
                        </div>

                        <div class="item-content">
                            <div class="item-image">
                                ${imageUrl ? `<img src="${imageUrl}" alt="${item.title}">` : '<div style="color: #999;">No Image</div>'}
                            </div>

                            <div class="item-details">
                                <div class="detail-row">
                                    <div class="detail-label">Category:</div>
                                    <div class="detail-value">${item.category || "N/A"}</div>
                                </div>

                                <div class="detail-row">
                                    <div class="detail-label">Location:</div>
                                    <div class="detail-value">${item.location || "N/A"}</div>
                                </div>

                                <div class="detail-row">
                                    <div class="detail-label">Found Date:</div>
                                    <div class="detail-value">${new Date(item.date).toLocaleDateString() || "N/A"}</div>
                                </div>

                                <div class="detail-row">
                                    <div class="detail-label">Description:</div>
                                    <div class="detail-value">${item.description || "No description provided"}</div>
                                </div>

                                <div class="reporter-info">
                                    <h4>👤 Reported By</h4>
                                    <div><strong>${reportedBy.name || "Anonymous"}</strong></div>
                                    <div>${reportedBy.email || "N/A"}</div>
                                    <div style="margin-top: 5px; font-size: 0.9em;">Current Score: <strong>${reportedBy.honestyScore || 0} pts</strong></div>
                                </div>

                                ${matchedItem._id ? `
                                    <div class="reporter-info" style="background: #e8f5e9;">
                                        <h4>🔗 Matched Lost Item</h4>
                                        <div><strong>${matchedItem.title || "Unknown"}</strong></div>
                                        <div>${matchedItem.description || "No description"}</div>
                                    </div>
                                ` : ''}

                                <div class="verification-form">
                                    <h4 style="margin-bottom: 15px; color: #333;">Verification Details</h4>

                                    <div class="form-group">
                                        <label>Item Value</label>
                                        <select id="itemValue_${item._id}" class="form-input">
                                            <option value="normal">Normal (10 points)</option>
                                            <option value="valuable">Valuable (20 points)</option>
                                            <option value="critical">Critical/Important (30 points)</option>
                                        </select>
                                    </div>

                                    <div class="form-group">
                                        <div class="checkbox-group">
                                            <input type="checkbox" id="submitted_${item._id}">
                                            <label for="submitted_${item._id}" style="margin: 0;">✓ Item physically submitted to admin office</label>
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <label>Verification Notes</label>
                                        <textarea id="notes_${item._id}" placeholder="Add any verification notes..."></textarea>
                                    </div>

                                    <div class="form-actions">
                                        <button class="btn btn-approve" onclick="approveItem('${item._id}')">✓ Approve & Award Score</button>
                                        <button class="btn btn-reject" onclick="showRejectForm('${item._id}')">✗ Reject Report</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        async function approveItem(itemId) {
            const itemValue = document.getElementById(`itemValue_${itemId}`).value;
            const physicallySubmitted = document.getElementById(`submitted_${itemId}`).checked;
            const adminNotes = document.getElementById(`notes_${itemId}`).value;

            try {
                const response = await fetch(`${API_URL}/honesty/admin/verify/${itemId}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        itemValue,
                        physicallySubmitted,
                        adminNotes
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(`✓ Approved! ${data.scoreUpdate.pointsAwarded} points awarded to ${data.scoreUpdate.user}`, "success");
                    loadPendingVerifications();
                } else {
                    showAlert("Error approving item: " + data.message, "error");
                }
            } catch (error) {
                console.error("Error approving item:", error);
                showAlert("Error approving item", "error");
            }
        }

        function showRejectForm(itemId) {
            const reason = prompt("Enter rejection reason:");
            if (reason) {
                rejectItem(itemId, reason);
            }
        }

        async function rejectItem(itemId, reason) {
            try {
                const response = await fetch(`${API_URL}/honesty/admin/reject/${itemId}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({ rejectionReason: reason })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert("✗ Report rejected. No points awarded.", "success");
                    loadPendingVerifications();
                } else {
                    showAlert("Error rejecting item: " + data.message, "error");
                }
            } catch (error) {
                console.error("Error rejecting item:", error);
                showAlert("Error rejecting item", "error");
            }
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById("alertContainer");
            const alertClass = type === "success" ? "success" : "error";
            const alert = document.createElement("div");
            alert.className = alertClass;
            alert.textContent = message;
            alertContainer.appendChild(alert);

            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        // Initial load
        loadPendingVerifications();

        // Refresh every 30 seconds
        setInterval(loadPendingVerifications, 30000);
    </script>
</body>
</html>
